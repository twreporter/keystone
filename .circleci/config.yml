version: 2.1
parameters:
  working-directory:
    type: string
    default: "~/keystone"

executors:
  node-executor:
    docker:
      - image: circleci/node:10.15
    working_directory: << pipeline.parameters.working-directory >>
  # Node 22.14+ and npm 11.5.1+ are required for OIDC trusted publishing
  node-publish-executor:
    docker:
      - image: cimg/node:22.14
    working_directory: << pipeline.parameters.working-directory >>

commands:
  install-deps:
    description: "Install build dependencies"
    steps:
      - restore_cache:
          keys:
            - v1-dependencies-build-{{ checksum "yarn.lock" }}
      - run: yarn install --frozen-lockfile
      - save_cache:
          paths:
            - node_modules
          key: v1-dependencies-build-{{ checksum "yarn.lock" }}

jobs:
  build:
    executor: node-executor
    steps:
      - checkout
      - install-deps
      - run: yarn build
      - persist_to_workspace:
        root: << pipeline.parameters.working-directory >>
        paths:
            - ./*
  publish:
    executor: node-publish-executor
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Publish to npm with OIDC
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npm publish

workflows:
  version: 2.1
  build-and-publish:
    jobs:
      - build:
          filters:
            tags:
              only: /^v\d+\.\d+\.\d+(-rc\.\d+)?$/
      - publish:
          context: twreporter
          requires:
            - build
          filters:
            tags:
              only: /^v\d+\.\d+\.\d+(-rc\.\d+)?$/
            branches:
              ignore: /.*/
